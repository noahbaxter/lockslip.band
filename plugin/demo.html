<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guillotine Demo</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe id="plugin"></iframe>
  <script>
    // ============================================
    // DEMO CONFIG - edit these values as needed
    // ============================================
    const DEMO_CONFIG = {
      // Delay before triggering the guillotine cut (ms)
      cutDelay: 2000,

      // Knob values
      ceiling: -13,           // dB (-60 to 0)
      inputGain: 0.0,        // dB (-24 to 24)
      outputGain: 0.0,       // dB (-24 to 24)
      dryWet: 100,           // % (0 to 100)
      curve: 0,              // 0=Hard, 1=Quint, 2=Cubic, 3=Tanh, 4=Atan, 5=Knee, 6=T2
      curveExponent: 1.0,    // exponent for Knee/T2 (1.0 to 4.0)
      oversampling: 2,       // 0=1x, 1=2x, 2=4x, 3=8x, 4=16x, 5=32x

      // Toggles
      truePeak: true,        // true peak clipping
      filterType: 0,         // 0=min-phase, 1=linear-phase
      stereoMode: 0,         // 0=stereo-link, 1=L/R, 2=M/S
      bypass: true,          // start with blade up (true) or down (false)

      // View settings
      zoom: -24,             // Microscope zoom in dB (-12, -24, -36, -48, -60)
    };
    // ============================================

    const BUFFER_SIZE = 400;
    const envelope = new Float32Array(BUFFER_SIZE);
    let writePos = 0;
    let audioData = null;
    let audioPos = 0;
    const DOWNSAMPLE = 128;

    function createEnvelopeBlob() {
      const buffer = new ArrayBuffer(BUFFER_SIZE * 4 + 4);
      new Float32Array(buffer, 0, BUFFER_SIZE).set(envelope);
      new DataView(buffer).setUint32(BUFFER_SIZE * 4, writePos, true);
      return new Blob([buffer], { type: 'application/octet-stream' });
    }

    // Load the plugin UI with defaults injected BEFORE main.js runs
    async function loadPlugin() {
      const [htmlResponse, versionResponse] = await Promise.all([
        fetch('/guillotine/web/index.html'),
        fetch('/guillotine/VERSION')
      ]);
      let html = await htmlResponse.text();
      const version = (await versionResponse.text()).trim();

      // Inject GUILLOTINE_DEFAULTS and base href before </head>
      const defaults = {
        bypass: DEMO_CONFIG.bypass,
        ceiling: DEMO_CONFIG.ceiling,
        inputGain: DEMO_CONFIG.inputGain,
        outputGain: DEMO_CONFIG.outputGain,
        dryWet: DEMO_CONFIG.dryWet,
        curve: DEMO_CONFIG.curve,
        curveExponent: DEMO_CONFIG.curveExponent,
        oversampling: DEMO_CONFIG.oversampling,
        truePeak: DEMO_CONFIG.truePeak,
        filterType: DEMO_CONFIG.filterType,
        stereoMode: DEMO_CONFIG.stereoMode,
        zoom: DEMO_CONFIG.zoom,
      };

      const injection = `
        <base href="/guillotine/web/">
        <script>window.GUILLOTINE_DEFAULTS = ${JSON.stringify(defaults)};<\/script>
      `;
      html = html.replace('<head>', '<head>' + injection);
      html = html.replace('<span id="version-num"></span>', `<span id="version-num">v${version}</span>`);
      html = html.replace('src="main.js"', 'src="/guillotine/web/main.js"');

      const iframe = document.getElementById('plugin');
      iframe.srcdoc = html;

      iframe.addEventListener('load', () => {
        const win = iframe.contentWindow;
        const doc = iframe.contentDocument;

        // Override fetch to intercept envelope.bin requests
        const originalFetch = win.fetch.bind(win);
        win.fetch = (url, options) => {
          if (typeof url === 'string' && url.endsWith('envelope.bin')) {
            return Promise.resolve(new Response(createEnvelopeBlob(), { status: 200 }));
          }
          return originalFetch(url, options);
        };

        // Trigger the guillotine cut after delay
        setTimeout(() => {
          const clickZone = doc.getElementById('click-zone-guillotine');
          if (clickZone) clickZone.click();
        }, DEMO_CONFIG.cutDelay);
      });
    }

    async function loadAudio() {
      const response = await fetch('/plugin/assets/demo-loop.mp3');
      const arrayBuffer = await response.arrayBuffer();
      const audioContext = new AudioContext();
      const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
      const channelData = audioBuffer.getChannelData(0);
      audioData = new Float32Array(channelData.length);
      for (let i = 0; i < channelData.length; i++) {
        audioData[i] = Math.abs(channelData[i]);
      }
      animate();
    }

    function animate() {
      if (!audioData) return;
      for (let i = 0; i < 2; i++) {
        let sum = 0;
        for (let j = 0; j < DOWNSAMPLE; j++) {
          sum += audioData[(audioPos + j) % audioData.length];
        }
        envelope[writePos] = Math.min(1, (sum / DOWNSAMPLE) * 2.5 + 0.05);
        writePos = (writePos + 1) % BUFFER_SIZE;
        audioPos = (audioPos + DOWNSAMPLE) % audioData.length;
      }
      requestAnimationFrame(animate);
    }

    loadPlugin();
    loadAudio();
  </script>
</body>
</html>
