<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guillotine Demo</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe id="plugin" src="/guillotine/web/index.html"></iframe>
  <script>
    // ============================================
    // DEMO CONFIG - edit these values as needed
    // ============================================
    const DEMO_CONFIG = {
      // Delay before triggering the guillotine cut (ms)
      cutDelay: 3000,

      // Knob values (use null to keep default)
      ceiling: -0.3,         // dB (-24 to 0)
      inputGain: 6.0,        // dB (-24 to 24)
      outputGain: 0.0,       // dB (-24 to 24)
      dryWet: 100,           // % (0 to 100)
      curve: 0,              // 0=Hard, 1=Cubic, 2=Quintic, 3=Tanh, 4=Arctan, 5=Knee, 6=T2
      curveExponent: 1.0,    // exponent for curve (0.1 to 10)
      oversampling: 1,       // 0=1x, 1=2x, 2=4x, 3=8x, 4=16x, 5=32x

      // Toggles (use null to keep default)
      truePeak: false,       // true peak clipping
      filterType: 0,         // 0=min-phase, 1=linear-phase
      stereoMode: 0,         // 0=L/R, 1=M/S, 2=stereo-link
    };
    // ============================================

    const BUFFER_SIZE = 400;
    const envelope = new Float32Array(BUFFER_SIZE);
    let writePos = 0;
    let audioData = null;
    let audioPos = 0;
    const DOWNSAMPLE = 128;

    function createEnvelopeBlob() {
      const buffer = new ArrayBuffer(BUFFER_SIZE * 4 + 4);
      new Float32Array(buffer, 0, BUFFER_SIZE).set(envelope);
      new DataView(buffer).setUint32(BUFFER_SIZE * 4, writePos, true);
      return new Blob([buffer], { type: 'application/octet-stream' });
    }

    const iframe = document.getElementById('plugin');
    iframe.addEventListener('load', () => {
      const win = iframe.contentWindow;
      const doc = iframe.contentDocument;

      // Override fetch to intercept envelope.bin
      const originalFetch = win.fetch.bind(win);
      win.fetch = (url, options) => {
        if (typeof url === 'string' && url.endsWith('envelope.bin')) {
          return Promise.resolve(new Response(createEnvelopeBlob(), { status: 200 }));
        }
        return originalFetch(url, options);
      };

      // Wait for app to initialize, then apply config
      const applyConfig = () => {
        const app = win.guillotineApp;
        if (!app) {
          setTimeout(applyConfig, 100);
          return;
        }

        // Apply knob values
        if (DEMO_CONFIG.ceiling !== null) app.thresholdKnob?.setValue(DEMO_CONFIG.ceiling);
        if (DEMO_CONFIG.inputGain !== null) app.inputGainKnob?.setValue(DEMO_CONFIG.inputGain);
        if (DEMO_CONFIG.outputGain !== null) app.outputGainKnob?.setValue(DEMO_CONFIG.outputGain);
        if (DEMO_CONFIG.dryWet !== null) app.drywetKnob?.setValue(DEMO_CONFIG.dryWet);
        if (DEMO_CONFIG.curve !== null) app.curveKnob?.setValue(DEMO_CONFIG.curve);
        if (DEMO_CONFIG.curveExponent !== null) app.curveExponentKnob?.setValue(DEMO_CONFIG.curveExponent);
        if (DEMO_CONFIG.oversampling !== null) app.oversamplingKnob?.setValue(DEMO_CONFIG.oversampling);

        // Apply toggles
        if (DEMO_CONFIG.truePeak !== null) app.trueclipToggle?.setState(DEMO_CONFIG.truePeak ? 1 : 0);
        if (DEMO_CONFIG.filterType !== null) app.filterTypeToggle?.setState(DEMO_CONFIG.filterType);
        if (DEMO_CONFIG.stereoMode !== null) app.stereoModeToggle?.setState(DEMO_CONFIG.stereoMode);
      };
      setTimeout(applyConfig, 500);

      // Trigger the guillotine cut after delay
      setTimeout(() => {
        const clickZone = doc.getElementById('click-zone-guillotine');
        if (clickZone) clickZone.click();
      }, DEMO_CONFIG.cutDelay);
    });

    async function loadAudio() {
      const response = await fetch('/plugin/assets/demo-loop.mp3');
      const arrayBuffer = await response.arrayBuffer();
      const audioContext = new AudioContext();
      const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
      const channelData = audioBuffer.getChannelData(0);
      audioData = new Float32Array(channelData.length);
      for (let i = 0; i < channelData.length; i++) {
        audioData[i] = Math.abs(channelData[i]);
      }
      animate();
    }

    function animate() {
      if (!audioData) return;
      for (let i = 0; i < 2; i++) {
        let sum = 0;
        for (let j = 0; j < DOWNSAMPLE; j++) {
          sum += audioData[(audioPos + j) % audioData.length];
        }
        envelope[writePos] = Math.min(1, (sum / DOWNSAMPLE) * 2.5 + 0.05);
        writePos = (writePos + 1) % BUFFER_SIZE;
        audioPos = (audioPos + DOWNSAMPLE) % audioData.length;
      }
      requestAnimationFrame(animate);
    }

    loadAudio();
  </script>
</body>
</html>
