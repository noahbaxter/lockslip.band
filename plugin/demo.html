<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guillotine Demo</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe id="plugin-frame" src="../guillotine/web/index.html"></iframe>
  <script>
    const BUFFER_SIZE = 512;
    const preClip = new Float32Array(BUFFER_SIZE);
    let writePos = 0;
    let audioData = null;
    let audioPos = 0;
    const DOWNSAMPLE = 128;

    async function loadAudio() {
      try {
        const response = await fetch('assets/demo-loop.mp3');
        const arrayBuffer = await response.arrayBuffer();
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        const channelData = audioBuffer.getChannelData(0);
        audioData = new Float32Array(channelData.length);
        for (let i = 0; i < channelData.length; i++) {
          audioData[i] = Math.abs(channelData[i]);
        }
        generateFromAudio();
      } catch (e) {
        console.error('Failed to load demo audio:', e);
      }
    }

    function generateFromAudio() {
      if (!audioData) return;
      for (let i = 0; i < 2; i++) {
        let sum = 0;
        for (let j = 0; j < DOWNSAMPLE; j++) {
          sum += audioData[(audioPos + j) % audioData.length];
        }
        preClip[writePos] = Math.min(1, (sum / DOWNSAMPLE) * 2.5 + 0.05);
        writePos = (writePos + 1) % BUFFER_SIZE;
        audioPos = (audioPos + DOWNSAMPLE) % audioData.length;
      }
      const iframe = document.getElementById('plugin-frame');
      if (iframe.contentWindow?.updateEnvelope) {
        iframe.contentWindow.updateEnvelope({ preClip, writePos });
      }
      requestAnimationFrame(generateFromAudio);
    }

    setTimeout(loadAudio, 500);
  </script>
</body>
</html>
